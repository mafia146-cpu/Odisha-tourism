<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: url('https://png.pngtree.com/thumb_back/fh260/background/20210907/pngtree-tourist-attraction-landmark-image_795645.jpg') no-repeat center/cover;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.5);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  color: white;
  width: 90%;
  max-width: 600px;
  max-height: 90vh;
  overflow: hidden;
}

h1 {
  margin-bottom: 20px;
  font-size: 40px;
}

input {
  width: 80%;
  padding: 10px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: none;
}

select, button {
  padding: 12px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  margin: 10px;
}

button {
  background: #ff5722;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #e64a19;
}

#results {
  margin-top: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  max-height: 400px;
  overflow-y: auto;
  padding-right: 5px;
}

/* place css */
.place {
  background: rgba(255,255,255,0.15);
  padding: 15px;
  border-radius: 15px;
  transition: 0.3s;
  backdrop-filter: blur(5px);
}

.place:hover {
  transform: translateY(-5px) scale(1.02);
}

.place h3 {
  margin: 0;
  color: #ffcc70;
  font-size: 18px;
}
.place p {
  margin-top: 8px;
  font-size: 14px;
  line-height: 1.4;
  cursor: pointer;
}

/* hotel css */
.hotel-container {
  text-align: center;
}

.hotel-title {
  text-align: center;
  margin-bottom: 20px;
}

.hotel-heading {
  text-align: center;
  margin-top: 20px;
}

.hotel-section {
  margin-bottom: 20px;
}

.hotel-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
  margin-top: 10px;
  cursor: pointer;
}

.hotel-card {
  background: rgba(255,255,255,0.15);
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  transition: 0.3s;
}

.hotel-card:hover {
  transform: scale(1.05);
}

</style>
</head>

//hotel generator
function generateHotels(placeName) {
  return {
    four: [
      `Hotel ${placeName} Residency`,
      `${placeName} Comfort Inn`,
      `${placeName} Grand Stay`
    ],
    five: [
      `${placeName} Palace`,
      `${placeName} Luxury Resort`,
      `${placeName} Royal Suites`
    ]
  };
}

// Populate dropdown
const dropdown = document.getElementById("district");
for (let district in data) {
  let option = document.createElement("option");
  option.value = district;
  option.textContent = district;
  dropdown.appendChild(option);
}

// Show places
function showPlaces() {
  const district = document.getElementById("district").value;
  const results = document.getElementById("results");
  results.innerHTML = "";

  if (!district) {
    results.innerHTML = "<p>Please select a district.</p>";
    return;
  }

  data[district].forEach(place => {
    const div = document.createElement("div");
    div.className = "place";

    div.innerHTML = `
      <h3>${place.name}</h3>
      <p>${place.desc}</p>
    `;

    // 👇 CLICK EVENT
    div.onclick = () => showHotels(place.name);

    results.appendChild(div);
  });
}

//showhotel function
function showHotels(placeName) {
  const results = document.getElementById("results");

  // ✅ This handles BOTH real + generated
  const dataHotel = hotels[placeName] || generateHotels(placeName);

  results.innerHTML = `
    <div class="hotel-container">

      <h2 class="hotel-title">Hotels in ${placeName}</h2>

      <div class="hotel-section">
        <h3 class="hotel-heading">⭐ 4-Star Hotels</h3>
        <div class="hotel-grid">
          ${dataHotel.four.map(h => `
            <div class="hotel-card" data-query="${h} ${placeName}">
              ${h}
            </div>
          `).join("")}
        </div>
      </div>

      <div class="hotel-section">
        <h3 class="hotel-heading">⭐ 5-Star Hotels</h3>
        <div class="hotel-grid">
          ${dataHotel.five.map(h => `
            <div class="hotel-card" data-query="${h} ${placeName}">
              ${h}
            </div>
          `).join("")}
        </div>
      </div>

      <button onclick="goBack()">⬅ Back</button>

    </div>
  `;

  results.querySelectorAll('.hotel-card').forEach(card => {
    card.addEventListener('click', () => openMap(card.dataset.query));
  });
}

//hotel google search function
function openMap(hotelName) {
  const query = encodeURIComponent(hotelName);
  const url = `https://www.google.com/maps/search/?api=1&query=${query}`;
  window.open(url, "_blank");
}

// backbutton function
function goBack() {
  showPlaces();
}

// Search filter
function filterDistricts() {
  const input = document.getElementById("searchBox").value.toLowerCase();
  const options = dropdown.options;

  for (let i = 0; i < options.length; i++) {
    let txt = options[i].text.toLowerCase();
    options[i].style.display = txt.includes(input) ? "" : "none";
  }
}
